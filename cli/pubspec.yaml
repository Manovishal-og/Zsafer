name: zsafer
description: Ephemeral file sharing CLI with protected viewer
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dart_console: ^1.1.0
  ffi: ^2.1.0
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_linux: ^1.0.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
